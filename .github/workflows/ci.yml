name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  headless:
    name: Linux ${{ matrix.compiler }} headless
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            cc: gcc
            cxx: g++
          - compiler: Clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libvips-dev
      - name: Configure
        run: cmake --preset headless
      - name: Build
        run: cmake --build --preset headless
      - name: Test
        run: ctest --preset headless

  minimal:
    name: Linux minimal core-only
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Configure
        run: cmake --preset minimal
      - name: Build
        run: cmake --build --preset minimal
      - name: Test
        run: ctest --preset minimal

  audio-disabled:
    name: Linux offline image build without audio discovery
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libvips-dev
      - name: Configure
        run: cmake --preset audio-disabled
      - name: Build
        run: cmake --build --preset audio-disabled
      - name: Test
        run: ctest --preset audio-disabled

  gui:
    name: Linux Qt GUI smoke test
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
      QT_QUICK_BACKEND: software
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.8.3'
          cache: false
          setup-python: false
      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libvips-dev
      - name: Configure
        run: cmake --preset dev
      - name: Build
        run: cmake --build --preset dev
      - name: Test
        run: ctest --preset dev
